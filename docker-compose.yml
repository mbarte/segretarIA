services:

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: segretaria-api
    restart: unless-stopped
    ports:
      - "5000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app  #rimuovere in produzione
      - ./storage:/storage
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: segretaria-ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ollama_data: #named volume - maggiore portabilità e gestione completa da parte di docker (permessi, backup etc)
